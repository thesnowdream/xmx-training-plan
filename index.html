<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XMX的变强计划</title>
  <style>
    :root {
      --bg: #f4f1ec;
      --panel: #fffdf9;
      --panel-soft: #ece7df;
      --text: #343833;
      --muted: #747970;
      --line: #ded8ce;
      --green: #7f9a8f;
      --green-dark: #5f776e;
      --coral: #c98276;
      --blue: #7d94ad;
      --amber: #b89a68;
      --violet: #9a84a8;
      --shadow: 0 18px 45px rgba(78, 74, 68, 0.11);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(127, 154, 143, 0.2), rgba(244, 241, 236, 0) 340px),
        var(--bg);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      padding: 8px 0 24px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--green-dark);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .summary {
      max-width: 720px;
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(88px, 1fr));
      gap: 8px;
      min-width: 330px;
    }

    .stat {
      min-height: 78px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 249, 0.82);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(360px, 0.85fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .calendar-panel {
      padding: 18px;
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .month-title {
      min-width: 170px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
    }

    .nav-button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: var(--panel-soft);
      cursor: pointer;
    }

    .nav-button:hover:not(:disabled) {
      border-color: var(--green);
      color: var(--green-dark);
      background: #e8ede6;
    }

    .nav-button:disabled {
      color: #b6b5ad;
      cursor: not-allowed;
      background: #efede8;
    }

    .weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekdays {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }

    .day {
      position: relative;
      min-height: 92px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      text-align: left;
      background: #fffdf9;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .day:hover:not(.disabled) {
      transform: translateY(-1px);
      border-color: rgba(127, 154, 143, 0.58);
      background: #f2eee7;
    }

    .day.selected {
      border-color: var(--green);
      background: #e8ede6;
      box-shadow: inset 0 0 0 1px var(--green);
    }

    .day.disabled {
      color: #b9b8b0;
      background: #efede8;
      cursor: default;
    }

    .date-number {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 16px;
      font-weight: 800;
    }

    .today-mark {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
    }

    .finish-marker {
      position: absolute;
      right: 6px;
      bottom: 6px;
      width: 42px;
      height: 42px;
      object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(0 5px 8px rgba(78, 74, 68, 0.2));
    }

    .tag {
      display: inline-flex;
      max-width: 100%;
      margin-top: 10px;
      padding: 4px 7px;
      border-radius: 999px;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.1;
      white-space: nowrap;
    }

    .tag.glutes { background: var(--coral); }
    .tag.back { background: var(--blue); }
    .tag.chest { background: var(--violet); }
    .tag.conditioning { background: var(--amber); }
    .tag.recovery { background: var(--green); }

    .mini {
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .detail {
      position: sticky;
      top: 18px;
      overflow: hidden;
    }

    .detail-hero {
      padding: 22px;
      color: #fff;
      background: linear-gradient(135deg, #6b625d, #8da196);
    }

    .detail-hero.glutes {
      background: linear-gradient(135deg, #7d6260, #c98276);
    }

    .detail-hero.back {
      background: linear-gradient(135deg, #586878, #7d94ad);
    }

    .detail-hero.chest {
      background: linear-gradient(135deg, #6b5d72, #9a84a8);
    }

    .detail-hero.conditioning {
      background: linear-gradient(135deg, #7e7059, #b89a68);
    }

    .detail-hero.recovery {
      background: linear-gradient(135deg, #63766e, #8da196);
    }

    .detail-date {
      margin: 0 0 10px;
      font-size: 14px;
      opacity: 0.86;
    }

    .detail-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .chip {
      padding: 7px 10px;
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 999px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.12);
    }

    .detail-body {
      padding: 18px 22px 22px;
    }

    .phase-note {
      margin: 0 0 16px;
      padding: 12px;
      border-left: 4px solid var(--green);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--muted);
      line-height: 1.55;
      background: var(--panel-soft);
    }

    .section {
      padding: 16px 0;
      border-top: 1px solid var(--line);
    }

    .section:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .section h2 {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 12px;
      font-size: 16px;
    }

    .section h2::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
    }

    .moves {
      display: grid;
      gap: 9px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .move {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffdf9;
    }

    .move input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
      cursor: pointer;
    }

    .move.done {
      border-color: #d6d1c8;
      background: #f1eee7;
    }

    .move-field {
      width: 100%;
      min-width: 0;
      border: 0;
      border-radius: 6px;
      color: inherit;
      background: transparent;
      outline: 0;
    }

    .move-field:focus {
      background: #fffdf9;
      box-shadow: inset 0 0 0 1px rgba(127, 154, 143, 0.46);
    }

    .move-name {
      min-width: 0;
      font-weight: 750;
      line-height: 1.35;
    }

    .move-dose {
      color: var(--green-dark);
      font-size: 13px;
      font-weight: 850;
      text-align: right;
      white-space: nowrap;
    }

    .move.done .move-field {
      color: #85847b;
      text-decoration: line-through;
    }

    .notes {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.65;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fffdf9;
    }

    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
    }

    @media (max-width: 920px) {
      .topbar,
      .layout {
        grid-template-columns: 1fr;
      }

      .stats {
        min-width: 0;
      }

      .detail {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 20px, 1220px);
        padding-top: 18px;
      }

      .calendar-panel {
        padding: 12px;
      }

      .calendar-head {
        gap: 8px;
      }

      .month-title {
        min-width: 130px;
        font-size: 18px;
      }

      .weekdays,
      .calendar-grid {
        gap: 5px;
      }

      .day {
        min-height: 70px;
        padding: 7px 5px;
      }

      .finish-marker {
        right: 3px;
        bottom: 3px;
        width: 30px;
        height: 30px;
      }

      .date-number {
        font-size: 14px;
      }

      .tag {
        margin-top: 7px;
        max-width: 100%;
        padding: 3px 5px;
        font-size: 10px;
      }

      .mini {
        display: none;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .detail-hero,
      .detail-body {
        padding-left: 16px;
        padding-right: 16px;
      }

      .move {
        grid-template-columns: auto 1fr;
        gap: 8px;
      }

      .move-dose {
        grid-column: 2;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">2026.05.07 - 2027.05.06 · 健身房器械 · 一周三到四练</p>
        <h1>XMX的变强计划</h1>
        <p class="summary">以固定器械训练为主，臀腿侧重后侧链，肩背侧重中下背，胸肩作为推力与肩部线条补充。每天点开后可勾选建议动作，按状态选择完成全部或部分训练。</p>
      </div>
      <div class="stats" aria-label="计划概览">
        <div class="stat">
          <strong>365</strong>
          <span>连续天数</span>
        </div>
        <div class="stat">
          <strong>3-4</strong>
          <span>每周器械训练</span>
        </div>
        <div class="stat">
          <strong>4</strong>
          <span>季度渐进阶段</span>
        </div>
      </div>
    </header>

    <section class="layout">
      <div class="panel calendar-panel" aria-label="训练日历">
        <div class="calendar-head">
          <button class="nav-button" id="prevMonth" type="button" aria-label="上个月">‹</button>
          <div class="month-title" id="monthTitle"></div>
          <button class="nav-button" id="nextMonth" type="button" aria-label="下个月">›</button>
        </div>
        <div class="weekdays" aria-hidden="true">
          <div>周一</div>
          <div>周二</div>
          <div>周三</div>
          <div>周四</div>
          <div>周五</div>
          <div>周六</div>
          <div>周日</div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="legend" aria-label="训练类型图例">
          <span class="legend-item"><span class="legend-dot" style="background: var(--coral)"></span>臀腿</span>
          <span class="legend-item"><span class="legend-dot" style="background: var(--blue)"></span>肩背</span>
          <span class="legend-item"><span class="legend-dot" style="background: var(--violet)"></span>胸肩</span>
          <span class="legend-item"><span class="legend-dot" style="background: var(--amber)"></span>有氧核心</span>
          <span class="legend-item"><span class="legend-dot" style="background: var(--green)"></span>恢复</span>
        </div>
      </div>

      <article class="panel detail" aria-live="polite">
        <div class="detail-hero" id="detailHero">
          <p class="detail-date" id="detailDate"></p>
          <h2 class="detail-title" id="detailTitle"></h2>
          <div class="chips" id="detailChips"></div>
        </div>
        <div class="detail-body">
          <p class="phase-note" id="phaseNote"></p>
          <div class="section">
            <h2>热身</h2>
            <ul class="moves" id="warmupList"></ul>
          </div>
          <div class="section">
            <h2>主训练</h2>
            <ul class="moves" id="mainList"></ul>
          </div>
          <div class="section">
            <h2>收操拉伸</h2>
            <ul class="moves" id="cooldownList"></ul>
          </div>
          <div class="section">
            <h2>注意事项</h2>
            <ul class="notes" id="notesList"></ul>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script>

    const endDate = new Date(2027, 4, 6);
    let selectedDate = new Date(startDate);

          ["低速台阶机", "5 分钟"]
        ],
        main: [
          ["坡度快走、椭圆机或台阶机", "25-35 分钟"],
          ["绳索卷腹", "3 组 x 12-15 次"],
          ["罗马椅举腿", "3 组 x 10-12 次"],
          ["坐姿转体机", "3 组 x 12 次/侧"]
        ],
        cooldown: [
          ["髋屈肌拉伸", "2 组 x 40 秒/侧"],
          ["猫牛式", "2 组 x 8 次"],
          ["腹式呼吸", "2 分钟"]
        ],
        notes: [
          "这是第 4 次训练日，疲劳大时可以只做低强度有氧。",
          "有氧强度保持能说短句、但略喘的状态。",
          "核心动作以稳定为主，不追求速度。"
        ]
      },
      recovery: {
        title: "恢复与活动度",
        minutes: "20-35 分钟",
        warmup: [
          ["轻松步行", "8-12 分钟"],
          ["肩颈放松", "2 分钟"]
        ],
        main: [
          ["泡沫轴放松股四头肌", "2 分钟/侧"],
          ["臀肌和梨状肌放松", "2 分钟/侧"],
          ["胸椎旋转", "3 组 x 8 次/侧"],
          ["髋 90/90 转换", "3 组 x 8 次/侧"]
        ],
        cooldown: [
          ["全身舒缓拉伸", "8-12 分钟"],
          ["鼻吸口呼放松", "2 分钟"]
        ],
        notes: [
          "恢复日不是完全偷懒，目标是让下一次器械训练状态更好。",
          "如果睡眠不足或酸痛明显，优先恢复，不额外加练。",
          "保持日常步数，有助于减脂和关节活动度。"
        ]
      }
    };

    function stripTime(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function daysBetween(a, b) {
      return Math.round((stripTime(b) - stripTime(a)) / 86400000);
    }

    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    function isInPlan(date) {
      const clean = stripTime(date);
      return clean >= startDate && clean <= endDate;
    }

    function formatDate(date) {
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${weekdayNames[date.getDay()]}`;
    }

    function getPhase(date) {
      const day = daysBetween(startDate, date);
      const phaseIndex = Math.min(3, Math.floor(day / 91));
      return phases[phaseIndex];
    }

    function getWorkoutType(date) {
      const index = daysBetween(startDate, date) % 7;
      const cycle = ["glutes", "recovery", "back", "recovery", "chest", "conditioning", "recovery"];
      return cycle[index];
    }

    function getSetCount(type, phase) {
      if (type === "conditioning" || type === "recovery") return 3;
      return 3 + phase.setBonus;
    }

    function buildDose(dose, type, phase) {
      if (!dose.includes("sets")) return dose;
      const sets = getSetCount(type, phase);
      return dose.replace("sets", `${sets} 组`).replace("reps", phase.repText);
    }

    function getPlan(date) {
      const type = getWorkoutType(date);
      const phase = getPhase(date);
      const base = workouts[type];
      return {
        type,
        phase,
        title: base.title,
        minutes: base.minutes,
        warmup: base.warmup.map(([name, dose]) => [name, buildDose(dose, type, phase)]),
        main: base.main.map(([name, dose]) => [name, buildDose(dose, type, phase)]),
        cooldown: base.cooldown.map(([name, dose]) => [name, buildDose(dose, type, phase)]),
        notes: base.notes
      };
    }

    function dateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function storageKey(date, section, index, field) {
      return `gym-plan:${dateKey(date)}:${section}:${index}:${field}`;
    }

    function getSavedMove(date, section, index, name, dose) {
      const savedName = localStorage.getItem(storageKey(date, section, index, "name"));
      const savedDose = localStorage.getItem(storageKey(date, section, index, "dose"));
      return {
        name: savedName === null ? name : savedName,
        dose: savedDose === null ? dose : savedDose,
        checked: localStorage.getItem(storageKey(date, section, index, "done")) === "1"
      };
    }

    function escapeAttribute(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function hasAnyCompletedMove(date) {
      const plan = getPlan(date);
      const sections = [
        ["warmup", plan.warmup],
        ["main", plan.main],
        ["cooldown", plan.cooldown]
      ];
      return sections.some(([section, items]) => {
        return items.some((item, index) => {
          return localStorage.getItem(storageKey(date, section, index, "done")) === "1";
        });
      });
    }

    function renderList(target, items, section, date) {
      target.innerHTML = "";
      items.forEach(([name, dose], index) => {
        const saved = getSavedMove(date, section, index, name, dose);
        const li = document.createElement("li");
        li.className = "move";
        if (saved.checked) li.classList.add("done");
        li.innerHTML = `
          <input type="checkbox" aria-label="勾选 ${escapeAttribute(saved.name)}" ${saved.checked ? "checked" : ""}>
          <input class="move-field move-name" type="text" value="${escapeAttribute(saved.name)}" aria-label="动作名称">
          <input class="move-field move-dose" type="text" value="${escapeAttribute(saved.dose)}" aria-label="组数和次数">
        `;
        const checkbox = li.querySelector('input[type="checkbox"]');
        const nameInput = li.querySelector(".move-name");
        const doseInput = li.querySelector(".move-dose");
        checkbox.addEventListener("change", (event) => {
          li.classList.toggle("done", event.target.checked);
          localStorage.setItem(storageKey(date, section, index, "done"), event.target.checked ? "1" : "0");
          renderCalendar();
        });
        nameInput.addEventListener("input", (event) => {
          localStorage.setItem(storageKey(date, section, index, "name"), event.target.value);
          checkbox.setAttribute("aria-label", `勾选 ${event.target.value || "未命名动作"}`);
        });
        doseInput.addEventListener("input", (event) => {
          localStorage.setItem(storageKey(date, section, index, "dose"), event.target.value);
        });
        target.appendChild(li);
      });
    }

    function renderNotes(notes) {
      notesList.innerHTML = "";
      notes.forEach((note) => {
        const li = document.createElement("li");
        li.textContent = note;
        notesList.appendChild(li);
      });
    }

    function renderDetail(date) {
      const plan = getPlan(date);
      detailHero.className = `detail-hero ${plan.type}`;
      detailDate.textContent = formatDate(date);
      detailTitle.textContent = plan.title;
      detailChips.innerHTML = `
        <span class="chip">${typeNames[plan.type]}</span>
        <span class="chip">${plan.phase.name}</span>
        <span class="chip">${plan.minutes}</span>
        <span class="chip">休息 ${plan.phase.rest}</span>
        <span class="chip">强度 ${plan.phase.intensity}</span>
      `;
      phaseNote.textContent = `${plan.phase.months} · ${plan.phase.note}`;
      renderList(warmupList, plan.warmup, "warmup", date);
      renderList(mainList, plan.main, "main", date);
      renderList(cooldownList, plan.cooldown, "cooldown", date);
      renderNotes(plan.notes);
    }

    function renderCalendar() {
      calendarGrid.innerHTML = "";
      const year = visibleMonth.getFullYear();
      const month = visibleMonth.getMonth();
      monthTitle.textContent = `${year}年${month + 1}月`;

      const first = new Date(year, month, 1);
      const firstWeekday = (first.getDay() + 6) % 7;
      const gridStart = new Date(year, month, 1 - firstWeekday);

      for (let i = 0; i < 42; i += 1) {
        const date = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + i);
        const button = document.createElement("button");
        const inMonth = date.getMonth() === month;
        const available = isInPlan(date);
        button.type = "button";
        button.className = "day";

        if (!inMonth || !available) button.classList.add("disabled");
        if (sameDay(date, selectedDate)) button.classList.add("selected");
        if (!available) button.disabled = true;

        const dayNumber = document.createElement("div");
        dayNumber.className = "date-number";
        dayNumber.innerHTML = `<span>${date.getDate()}</span>${sameDay(date, startDate) ? '<span class="today-mark" aria-label="计划开始"></span>' : ""}`;
        button.appendChild(dayNumber);

        if (available) {
          const plan = getPlan(date);
          const tag = document.createElement("span");
          tag.className = `tag ${plan.type}`;
          tag.textContent = typeNames[plan.type];
          button.appendChild(tag);

          const mini = document.createElement("div");
          mini.className = "mini";
          mini.textContent = `${plan.phase.intensity} · ${plan.minutes}`;
          button.appendChild(mini);

          if (hasAnyCompletedMove(date)) {
            const marker = document.createElement("img");
            marker.className = "finish-marker";
            marker.src = "assets/finish-marker.png";
            marker.alt = "已完成";
            button.appendChild(marker);
          }

          button.addEventListener("click", () => {
            selectedDate = new Date(date);
            visibleMonth = new Date(date.getFullYear(), date.getMonth(), 1);
            renderCalendar();
            renderDetail(selectedDate);
          });
        }

        calendarGrid.appendChild(button);
      }

      const minMonth = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
      const maxMonth = new Date(endDate.getFullYear(), endDate.getMonth(), 1);
      prevMonth.disabled = visibleMonth <= minMonth;
      nextMonth.disabled = visibleMonth >= maxMonth;
    }

    prevMonth.addEventListener("click", () => {
      visibleMonth = new Date(visibleMonth.getFullYear(), visibleMonth.getMonth() - 1, 1);
      renderCalendar();
    });

    nextMonth.addEventListener("click", () => {
      visibleMonth = new Date(visibleMonth.getFullYear(), visibleMonth.getMonth() + 1, 1);
      renderCalendar();
    });

    renderCalendar();
    renderDetail(selectedDate);
  </script>
</body>
</html>
